source = ~/.config/hypr/hyprpaper-wallpaper.conf
source = ~/.config/hypr/fonts.conf

# TOKYO NIGHT PALETTE
$fg       = rgb(192, 202, 245)    # #c0caf5  foreground (pale blue-white)
$accent   = rgb(122, 162, 247)    # #7aa2f7  blue (input outline)
$field_bg = rgba(26, 27, 38, 0.7) # #1a1b26  background (70% opacity, input fill)
$check    = rgb(158, 206, 106)    # #9ece6a  green (auth in progress)
$fail     = rgb(247, 118, 142)    # #f7768e  red (auth failed)

# BACKGROUND
background {
    monitor = HDMI-A-1
    path = $wallpaper_top
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}
background {
    monitor = DP-2
    path = $wallpaper_bottom
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    hide_cursor = false
}

# INPUT FIELD
input-field {
    monitor = DP-2
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $accent
    inner_color = $field_bg
    font_color = $fg
    check_color = $check
    fail_color = $fail
    fade_on_empty = false
    font_family = $font
    placeholder_text = <span font_family="$font_italic"><i><span foreground="##a9b1d6">Input Password...</span></i></span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# TIME
label {
    monitor = DP-2
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = $fg
    font_size = 120
    font_family = $font_bold
    position = 0, 80
    halign = center
    valign = center
}

# USER
label {
    monitor = DP-2
    text = Hi there, $USER
    color = $fg
    font_size = 25
    font_family = $font
    position = 0, -40
    halign = center
    valign = center
}
